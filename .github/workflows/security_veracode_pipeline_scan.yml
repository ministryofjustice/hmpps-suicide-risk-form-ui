name: Security veracode pipeline scan
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * MON-FRI" # Every weekday

jobs:
  security-veracode-pipeline-scan:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security veracode pipeline scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_veracode_pipeline_scan.yml@57c5abe47a8ebc9b1caa28ac601472a77036ab4d # v2.16.0
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
