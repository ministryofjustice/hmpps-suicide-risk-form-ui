name: Security CodeQL actions scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * MON-FRI" # Every weekday

jobs:
  security-codeql-actions-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security CodeQL actions scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_codeql_actions.yml@1b3b938084ba0e0803b045918aca69b8fb45c668 # v2.16.2
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit

