name: Security CodeQL actions scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * MON-FRI" # Every weekday

jobs:
  security-codeql-actions-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security CodeQL actions scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_codeql_actions.yml@57c5abe47a8ebc9b1caa28ac601472a77036ab4d # v2.16.0
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit

