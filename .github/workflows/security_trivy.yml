name: Security trivy dependency check
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * MON-FRI" # Every weekday

jobs:
  security-typescript-trivy-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security trivy dependency check
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_trivy.yml@d79e83be2cc392b981dd92c8f6f85007d18032e9 # v2.10.1
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
