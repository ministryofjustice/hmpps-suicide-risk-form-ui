name: Security trivy dependency check
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * MON-FRI" # Every weekday

jobs:
  security-typescript-trivy-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security trivy dependency check
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_trivy.yml@5156d7f46810b00163ce8e6a180346f00d8cc055 # v2.16.1
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
