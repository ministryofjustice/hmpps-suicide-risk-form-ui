name: Security veracode policy scan
on:
  workflow_dispatch:
  schedule:
    - cron: "1 8 * * 1" # Every Monday

jobs:
  security-veracode-policy-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security veracode policy scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_veracode_policy_scan.yml@1b3b938084ba0e0803b045918aca69b8fb45c668 # v2.16.2
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
